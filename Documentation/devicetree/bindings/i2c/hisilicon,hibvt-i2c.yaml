%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/hisilicon,hibvt-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon BVT I2C Controller

maintainers:
  - Dmitry Ilyin <6576495+widgetii@users.noreply.github.com>

allOf:
  - $ref: /schemas/i2c/i2c-controller.yaml#

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - hisilicon,hi3516ev200-i2c
              - hisilicon,hi3516ev300-i2c
              - hisilicon,hi3518ev300-i2c
              - hisilicon,hi3516dv200-i2c
              - hisilicon,hi3516dv300-i2c
          - const: hisilicon,hibvt-i2c

  reg:
    maxItems: 1

  clocks:
    maxItems: 1

  clock-frequency:
    default: 100000

  interrupts:
    maxItems: 1

required:
  - compatible
  - reg
  - clocks

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/clock/hi3516ev300-clock.h>
    i2c@12060000 {
        compatible = "hisilicon,hi3516ev300-i2c", "hisilicon,hibvt-i2c";
        reg = <0x12060000 0x1000>;
        clocks = <&clock 45>;
        clock-frequency = <100000>;
        #address-cells = <1>;
        #size-cells = <0>;
    };
