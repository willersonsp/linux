%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/hisilicon,hi3516ev200-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon BVT SoC Clock/Reset Generator (CRG)

maintainers:
  - Dmitry Ilyin <6576495+widgetii@users.noreply.github.com>

description: |
  The CRG (Clock/Reset Generator) provides clock and reset control for
  all peripherals on HiSilicon BVT IP camera SoCs.

properties:
  compatible:
    enum:
      - hisilicon,hi3516ev200-clock
      - hisilicon,hi3516ev300-clock
      - hisilicon,hi3518ev200-clock
      - hisilicon,hi3518ev300-clock
      - hisilicon,hi3516dv200-clock
      - hisilicon,hi3516dv300-clock

  reg:
    maxItems: 1

  '#clock-cells':
    const: 1

  '#reset-cells':
    const: 2

required:
  - compatible
  - reg
  - '#clock-cells'
  - '#reset-cells'

additionalProperties: false

examples:
  - |
    clock@12010000 {
        compatible = "hisilicon,hi3516ev300-clock";
        reg = <0x12010000 0x1000>;
        #clock-cells = <1>;
        #reset-cells = <2>;
    };
